<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="14" fill="#081E1B"/>
  <!-- Sitar silhouette — tumba (gourd body) -->
  <ellipse cx="50" cy="74" rx="20" ry="18" fill="#C9A84C"/>
  <!-- Sitar neck -->
  <rect x="46" y="22" width="8" height="52" rx="3" fill="#C9A84C"/>
  <!-- Sitar head -->
  <rect x="42" y="12" width="16" height="14" rx="4" fill="#C9A84C"/>
  <!-- Tuning pegs (left) -->
  <circle cx="40" cy="16" r="3" fill="#E8A820"/>
  <circle cx="40" cy="23" r="3" fill="#E8A820"/>
  <!-- Tuning pegs (right) -->
  <circle cx="60" cy="16" r="3" fill="#E8A820"/>
  <circle cx="60" cy="23" r="3" fill="#E8A820"/>
  <!-- Main strings (thin lines on neck) -->
  <line x1="48" y1="24" x2="48" y2="74" stroke="#081E1B" stroke-width="0.8" opacity="0.6"/>
  <line x1="50" y1="24" x2="50" y2="74" stroke="#081E1B" stroke-width="0.8" opacity="0.6"/>
  <line x1="52" y1="24" x2="52" y2="74" stroke="#081E1B" stroke-width="0.8" opacity="0.6"/>
  <!-- Bridge on tumba -->
  <rect x="42" y="68" width="16" height="3" rx="1" fill="#081E1B" opacity="0.5"/>
  <!-- Small gourd tumba highlight -->
  <ellipse cx="44" cy="68" rx="5" ry="4" fill="#E8A820" opacity="0.3"/>
</svg>
